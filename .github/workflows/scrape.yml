name: Daily Car Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # runs every day at 06:00 UTC
  workflow_dispatch:        # allows you to trigger it manually from GitHub

permissions:
  contents: write           # needed to commit and push data/cars.json

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape_mangocar.py

      - name: Commit updated cars.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cars.json
          git diff --staged --quiet || git commit -m "chore: update cars.json [$(date -u '+%Y-%m-%d')]"
          git push
